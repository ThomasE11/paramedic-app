<svg viewBox="0 0 96 112" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Non-rebreather oxygen mask">
  <!-- elastic head strap -->
  <path d="M24 28 H7 M72 28 H89" fill="none" stroke="#0e7490" stroke-width="5" stroke-linecap="round"/>
  <!-- mask body: clear cup over nose and mouth -->
  <path d="M48 8 C66 8 74 22 72 40 C70 56 60 66 48 66 C36 66 26 56 24 40 C22 22 30 8 48 8 Z"
        fill="#cfeefb" fill-opacity="0.78" stroke="#0e7490" stroke-width="4"/>
  <!-- nose clip -->
  <path d="M41 17 q7 -6 14 0" fill="none" stroke="#0e7490" stroke-width="3" stroke-linecap="round"/>
  <!-- exhalation one-way valves (the non-rebreather tell) -->
  <circle cx="35" cy="43" r="5" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
  <circle cx="61" cy="43" r="5" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
  <!-- connector from mask to reservoir bag -->
  <rect x="42" y="63" width="12" height="9" rx="3" fill="#0e7490"/>
  <!-- reservoir bag (inflated) -->
  <path d="M48 72 C64 72 72 84 70 96 C68 106 58 110 48 110 C38 110 28 106 26 96 C24 84 32 72 48 72 Z"
        fill="#34d399" fill-opacity="0.9" stroke="#047857" stroke-width="4"/>
  <!-- green high-flow O2 tubing off the bag -->
  <path d="M59 103 q21 5 28 -11" fill="none" stroke="#16a34a" stroke-width="5" stroke-linecap="round"/>
</svg>
