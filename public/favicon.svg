<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Rounded square badge matching the role-selection brand colour. -->
  <rect width="64" height="64" rx="14" fill="#0ea5e9"/>
  <!-- Stethoscope glyph, simplified at favicon size. Two earpieces, bent
       tubing, chest-piece disc. Rendered with round caps/joins so the
       shape reads cleanly at 16px / 32px. -->
  <g fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 16 v10 a10 10 0 0 0 20 0 v-10"/>
    <circle cx="18" cy="16" r="2.2" fill="#ffffff"/>
    <circle cx="38" cy="16" r="2.2" fill="#ffffff"/>
    <path d="M28 36 v6 a8 8 0 0 0 16 0"/>
    <circle cx="48" cy="42" r="4.5" fill="#ffffff" stroke="#0ea5e9" stroke-width="2.5"/>
  </g>
</svg>
