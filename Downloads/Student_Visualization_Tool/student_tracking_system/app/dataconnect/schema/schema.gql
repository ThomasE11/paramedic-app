type User @table {
  displayName: String!
  email: String!
  userType: String!
  createdAt: Timestamp!
  photoUrl: String
  contactInfo: String
  bio: String
}

type Course @table {
  courseCode: String!
  courseName: String!
  academicYear: String!
  semester: String!
  createdAt: Timestamp!
  description: String
}

type Enrollment @table(key: ["student", "course"]) {
  student: User!
  course: Course!
  enrollmentDate: Timestamp!
  status: String
}

type InstructorAssignment @table(key: ["instructor", "course"]) {
  instructor: User!
  course: Course!
  assignmentDate: Timestamp!
  role: String
}

type Group @table {
  course: Course!
  groupName: String!
  createdAt: Timestamp!
  description: String
  purpose: String
}

type Message @table {
  sender: User!
  recipient: User
  group: Group
  content: String!
  sentAt: Timestamp!
  readAt: Timestamp
  attachmentUrl: String
}

type GroupMembership @table(key: ["user", "group"]) {
  user: User!
  group: Group!
  joinedAt: Timestamp!
  role: String
}